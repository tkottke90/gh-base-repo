name: Distribute Template

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      template:
        description: 'Template to distribute'
        required: true
        type: choice
        options:
          - .github/workflows/docker-deploy.yml
          - package.json

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.DISTRIBUTION_TOKEN }}
          path: target

      - name: Copy template
        env:
          TEMPLATE: ${{ inputs.template }}
        run: |
          src="source/.github/templates/${TEMPLATE}"
          dest="target/${TEMPLATE}"
          mkdir -p "$(dirname "$dest")"
          cp "$src" "$dest"

      - name: Open PR in target repo
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DISTRIBUTION_TOKEN }}
          path: target
          commit-message: "chore: add ${{ inputs.template }} from tkottke90/gh-base-repo"
          branch: chore/distribute-template
          delete-branch: true
          title: "chore: add ${{ inputs.template }} from tkottke90/gh-base-repo"
          body: |
            Distributes `${{ inputs.template }}` from [tkottke90/gh-base-repo](https://github.com/tkottke90/gh-base-repo).

            > [!WARNING]
            > Review this workflow carefully before merging — it will run with access to this repository's secrets.
